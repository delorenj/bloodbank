name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout holyfields sibling dependency
      run: |
        git clone --depth 1 https://github.com/${{ github.repository_owner }}/33GOD.git /tmp/33GOD
        git -C /tmp/33GOD config submodule.holyfields.url https://github.com/${{ github.repository_owner }}/holyfields.git
        git -C /tmp/33GOD submodule update --init holyfields
        cp -R /tmp/33GOD/holyfields ../holyfields

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: |
        uv sync --extra test
        uv pip install -r tests/requirements-test.txt

    - name: Lint with ruff
      run: |
        uv run ruff check .
      continue-on-error: true

    - name: Type check with mypy
      run: |
        uv run mypy . --ignore-missing-imports
      continue-on-error: true

    - name: Run tests with pytest
      run: |
        uv run pytest tests/ \
          --cov=. \
          --cov-report=xml \
          --cov-report=term-missing \
          --tb=short \
          -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml
          .coverage

  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout holyfields sibling dependency
      run: |
        git clone --depth 1 https://github.com/${{ github.repository_owner }}/33GOD.git /tmp/33GOD
        git -C /tmp/33GOD config submodule.holyfields.url https://github.com/${{ github.repository_owner }}/holyfields.git
        git -C /tmp/33GOD submodule update --init holyfields
        cp -R /tmp/33GOD/holyfields ../holyfields

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: |
        uv sync --extra test
        uv pip install -r tests/requirements-test.txt

    - name: Run integration tests
      run: |
        uv run pytest tests/ \
          -m integration \
          --tb=short \
          -v

  coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout holyfields sibling dependency
      run: |
        git clone --depth 1 https://github.com/${{ github.repository_owner }}/33GOD.git /tmp/33GOD
        git -C /tmp/33GOD config submodule.holyfields.url https://github.com/${{ github.repository_owner }}/holyfields.git
        git -C /tmp/33GOD submodule update --init holyfields
        cp -R /tmp/33GOD/holyfields ../holyfields

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: |
        uv sync --extra test
        uv pip install -r tests/requirements-test.txt

    - name: Generate coverage report
      run: |
        uv run pytest tests/ \
          --cov=. \
          --cov-report=html \
          --cov-report=term \
          --cov-fail-under=80

    - name: Archive coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 90
        MINIMUM_ORANGE: 80
