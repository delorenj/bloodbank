# event-toaster — standalone compose
#
# Joins the existing bloodbank-network and shouts every
# `bloodbank.evt.v1.>` envelope at ntfy.delo.sh. Independent of the broader
# bloodbank compose lifecycle.
#
# Bring up:
#   docker compose --project-name bloodbank-toaster \
#     -f services/event-toaster/docker-compose.yml \
#     up -d --build
#
# Tear down:
#   docker compose --project-name bloodbank-toaster \
#     -f services/event-toaster/docker-compose.yml \
#     down

name: bloodbank-toaster

networks:
  bloodbank-network:
    external: true

services:
  event-toaster:
    build:
      context: .
    container_name: bloodbank-event-toaster
    environment:
      NATS_URL: "nats://nats:4222"
      SUBJECT_FILTER: "${BLOODBANK_TOASTER_SUBJECT:-bloodbank.evt.v1.>}"
      NTFY_URL: "${BLOODBANK_TOASTER_NTFY_URL:-https://ntfy.delo.sh}"
      NTFY_TOPIC: "${BLOODBANK_TOASTER_NTFY_TOPIC:-bloodbank}"
      NTFY_PRIORITY: "${BLOODBANK_TOASTER_NTFY_PRIORITY:-5}"
      NTFY_TAGS: "${BLOODBANK_TOASTER_NTFY_TAGS:-drop_of_blood,zap}"
      NTFY_TOKEN: "${BLOODBANK_TOASTER_NTFY_TOKEN:-}"
      MAX_BODY_CHARS: "${BLOODBANK_TOASTER_MAX_BODY_CHARS:-400}"
      LOG_LEVEL: "${BLOODBANK_TOASTER_LOG_LEVEL:-INFO}"
    networks:
      - bloodbank-network
    restart: unless-stopped
