# Bloodbank — mise.toml
#
# Operator tasks for the self-hosted sandbox. All tasks operate on
# `compose/docker-compose.yml` with the `bloodbank` compose project name.

[env]
_.file = [".env"]
COMPOSE_PROJECT = "bloodbank"
COMPOSE_FILE = "compose/docker-compose.yml"

[tasks.up]
description = "Boot core sandbox (NATS + nats-init only)"
run = "docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE up -d nats nats-init"

[tasks."up:all"]
description = "Boot every compose profile (heartbeat + dapr + candystore)"
run = """
docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE \
  --profile heartbeat \
  --profile dapr-smoketest --profile dapr-subscribe \
  --profile candystore \
  up -d --build
"""

[tasks."up:candystore"]
description = "Boot candystore profile (postgres + app + daprd)"
run = """
docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE \
  --profile candystore up -d --build postgres candystore daprd-candystore
"""

[tasks.down]
description = "Tear the sandbox down (volumes included)"
run = """
docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE \
  --profile heartbeat \
  --profile dapr-smoketest --profile dapr-subscribe \
  --profile candystore \
  down -v
"""

[tasks.doctor]
description = "Manifest-driven scaffold check (no Docker, no network)"
run = "python3 cli/bb.py doctor"

[tasks."repo-health"]
description = "Read-only git/issue/PR/check snapshot for BMAD evidence"
run = "python3 cli/bb.py repo-health"

[tasks."repo-health:json"]
description = "Read-only structured JSON snapshot for BMAD/scripted evidence"
run = "python3 cli/bb.py repo-health --json"

[tasks."repo-health:strict"]
description = "Read-only strict gate: fail when worktree is not clean"
run = "python3 cli/bb.py repo-health --require-clean-worktree"

[tasks."repo-health:drift"]
description = "Read-only drift snapshot (branch divergence + modified/untracked + top-level buckets)"
run = "python3 ops/repo-health/drift_snapshot.py --repo ."

[tasks."repo-health:artifact"]
description = "Write timestamped JSON BMAD evidence artifact under _bmad_output/evidence"
run = """
bash -lc 'ts=$(date -u +%Y%m%dT%H%M%SZ); out="_bmad_output/evidence/repo-health-${ts}.json"; python3 cli/bb.py repo-health --json --out "$out"; echo "$out"'
"""

[tasks."repo-health:cleanup"]
description = "Remove generated artifacts (KEEP=N retention, REPORT=1 JSON, DRY_RUN=1 preview)"
run = "python3 ops/repo-health/cleanup.py"

[tasks."repo-health:idle-gate"]
description = "Evaluate idle-state throttle decision from a repo-health JSON snapshot"
run = "python3 ops/repo-health/idle_gate.py"

[tasks."repo-health:pilot-step"]
description = "Hermes pilot helper: idle-gate decision + strict gate + conditional artifact/cleanup"
run = "bash ops/repo-health/pilot_step.sh"

[tasks."bmad:closeout-scaffold"]
description = "Scaffold _bmad_output/issue-<id>-execution.md from template (requires ISSUE_ID=...)"
run = "python3 ops/bmad/scaffold_closeout.py"

[tasks."bmad:worktree-bootstrap"]
description = "Bootstrap isolated clean automation worktree (requires ISSUE_ID + SLUG; REUSE=1 to reuse)"
run = "python3 ops/bmad/bootstrap_clean_worktree.py"

[tasks."bmad:pr-merge-safe"]
description = "Safely merge PR with merged-state verification, cleanup follow-ups, and safe post-merge main reconciliation"
run = "python3 ops/bmad/merge_pr_safe.py"

[tasks."bmad:closeout-loop"]
description = "Unified closeout helper: safe merge + cleanup follow-ups + primary drift snapshot"
run = "python3 ops/bmad/closeout_loop.py"

[tasks."bmad:closeout-loop:artifact"]
description = "Run closeout loop and persist timestamped JSON artifact under _bmad_output/evidence/closeout"
run = "bash ops/bmad/closeout_loop_artifact.sh"

[tasks."bmad:closeout-cleanup-summary"]
description = "Read-only summary of closeout artifact cleanup status fields"
run = "python3 ops/bmad/closeout_cleanup_summary.py"

[tasks."bmad:gh-readonly-status"]
description = "Read-only issue/pr/repo status helper with bounded retry for transient gh connectivity failures"
run = "python3 ops/bmad/gh_readonly_status.py"

[tasks."bmad:retrigger-pr-checks"]
description = "Dispatch CI workflow for a PR head branch (no empty commit retrigger)"
run = "python3 ops/bmad/retrigger_pr_checks.py"

[tasks."bmad:preflight-strict-clean"]
description = "Strict-clean BMAD preflight gate; fails fast with actionable JSON when worktree is dirty"
run = "python3 ops/bmad/preflight_strict_clean.py"

[tasks."bmad:reconcile-main-divergence"]
description = "Detect/optionally reconcile patch-equivalent local main divergence vs origin/main"
run = "python3 ops/bmad/reconcile_main_divergence.py"

[tasks."bmad:primary-recovery-check"]
description = "Read-only diagnostics for recovering a diverged primary checkout when helper files are missing"
run = "python3 ops/bmad/primary_recovery_check.py"

[tasks."bmad:align-main-with-backup"]
description = "Backup-first helper to align diverged local main to origin/main (read-only by default)"
run = "python3 ops/bmad/align_main_with_backup.py"

[tasks."bmad:recovery-artifact-cleanup"]
description = "Cleanup helper for backup branches + recovery bundles with optional bundle-age gate (dry-run default)"
run = "python3 ops/bmad/recovery_artifact_cleanup.py"

[tasks."bmad:reconcile-submodule-drift"]
description = "Detect/optionally reconcile submodule gitlink drift to superproject recorded commits"
run = "python3 ops/bmad/reconcile_submodule_gitlink_drift.py"

[tasks."validate:schemas"]
description = "Validate the local schema tree ($id uniqueness + $ref resolution + Draft 2020-12 check)"
run = "bash scripts/validate_schemas.sh"

[tasks.bootstrap]
description = "Pre-boot file-presence validator"
run = "bash ops/bootstrap/check-platform.sh"

[tasks.smoketest]
description = "NATS-direct event round-trip"
run = "bash ops/smoketest/smoketest.sh"

[tasks."smoketest:command"]
description = "NATS-direct command + reply round-trip"
run = "bash ops/smoketest/smoketest-command.sh"

[tasks."smoketest:dapr"]
description = "Dapr publish smoke test"
run = "bash ops/smoketest/smoketest-dapr.sh"

[tasks."smoketest:dapr-subscribe"]
description = "Dapr publish -> subscribe round-trip"
run = "bash ops/smoketest/smoketest-dapr-subscribe.sh"

[tasks."smoketest:heartbeat"]
description = "Heartbeat producer/consumer end-to-end"
run = "bash ops/smoketest/smoketest-heartbeat.sh"

[tasks."smoketest:bloodbank-naming"]
description = "Stdlib-only contract verifier (§14 sequence × claude/copilot + negative probes)"
run = "bash ops/smoketest/smoketest-bloodbank-naming.sh"

[tasks."smoketest:schema-contract-consistency"]
description = "Assert every schema in bloodbank/schemas/bloodbank/v1/** declares a type the validator accepts (allowlist drift detector)"
run = "bash ops/smoketest/smoketest-schema-contract-consistency.sh"

[tasks."smoketest:schemas"]
description = "Schema tree validation + drift detector + contract verifier (no Docker)"
run = "mise run validate:schemas && mise run smoketest:schema-contract-consistency && mise run smoketest:bloodbank-naming"

[tasks."smoketest:repo-health-cleanup"]
description = "Local smoke test for cleanup helper + strict worktree mode"
run = "bash ops/smoketest/smoketest-repo-health-cleanup.sh"

[tasks."smoketest:bmad-closeout-scaffold"]
description = "Local smoke test for BMAD closeout scaffold helper"
run = "bash ops/smoketest/smoketest-bmad-closeout-scaffold.sh"

[tasks."smoketest:bmad-closeout-loop"]
description = "Local smoke test for unified BMAD closeout helper JSON/evidence path"
run = "bash ops/smoketest/smoketest-bmad-closeout-loop.sh"

[tasks."smoketest:bmad-merge-pr-safe"]
description = "Local smoke test for safe PR merge helper JSON/cleanup fields"
run = "bash ops/smoketest/smoketest-bmad-merge-pr-safe.sh"

[tasks."smoketest:bmad-merge-pr-preflight-guard"]
description = "Local smoke test for merge helper strict-clean preflight enforcement + bypass"
run = "bash ops/smoketest/smoketest-bmad-merge-pr-preflight-guard.sh"

[tasks."smoketest:bmad-retrigger-pr-checks"]
description = "Local smoke test for PR check retrigger helper JSON contract (dry-run)"
run = "bash ops/smoketest/smoketest-bmad-retrigger-pr-checks.sh"

[tasks."smoketest:bmad-github-body-safety"]
description = "Guard against risky inline gh --body usage in BMAD operator docs/scripts"
run = "bash ops/smoketest/smoketest-bmad-github-body-safety.sh"

[tasks."smoketest:bmad-closeout-cleanup-summary"]
description = "Local smoke test for closeout cleanup summary helper JSON output"
run = "bash ops/smoketest/smoketest-bmad-closeout-cleanup-summary.sh"

[tasks."smoketest:bmad-closeout-artifact-summary"]
description = "Local smoke test for closeout artifact write + summary visibility"
run = "bash ops/smoketest/smoketest-bmad-closeout-artifact-summary.sh"

[tasks."smoketest:bmad-repo-health-retry"]
description = "Local smoke test for repo-health transient gh retry behavior"
run = "bash ops/smoketest/smoketest-bmad-repo-health-retry.sh"

[tasks."smoketest:bmad-repo-health-helper-availability"]
description = "Local smoke test for repo-health helper availability snapshot fields"
run = "bash ops/smoketest/smoketest-bmad-repo-health-helper-availability.sh"

[tasks."smoketest:bmad-repo-health-idle-gate"]
description = "Local smoke test for idle-state repo-health throttle decision helper"
run = "bash ops/smoketest/smoketest-bmad-repo-health-idle-gate.sh"

[tasks."smoketest:bmad-repo-health-pilot-step-autoheal"]
description = "Local smoke test for pilot-step strict-fail submodule drift auto-heal path"
run = "bash ops/smoketest/smoketest-bmad-repo-health-pilot-step-autoheal.sh"

[tasks."smoketest:bmad-gh-readonly-status"]
description = "Local smoke test for read-only gh status helper retry behavior"
run = "bash ops/smoketest/smoketest-bmad-gh-readonly-status.sh"

[tasks."smoketest:bmad-preflight-strict-clean"]
description = "Local smoke test for strict-clean BMAD preflight helper JSON contract"
run = "bash ops/smoketest/smoketest-bmad-preflight-strict-clean.sh"

[tasks."smoketest:bmad-reconcile-main-divergence"]
description = "Local smoke test for patch-equivalent main divergence detection/reconcile helper"
run = "bash ops/smoketest/smoketest-bmad-reconcile-main-divergence.sh"

[tasks."smoketest:bmad-primary-recovery-check"]
description = "Local smoke test for read-only primary checkout recovery diagnostics helper"
run = "bash ops/smoketest/smoketest-bmad-primary-recovery-check.sh"

[tasks."smoketest:bmad-align-main-with-backup"]
description = "Local smoke test for backup-first diverged-main alignment helper"
run = "bash ops/smoketest/smoketest-bmad-align-main-with-backup.sh"

[tasks."smoketest:bmad-recovery-artifact-cleanup"]
description = "Local smoke test for backup-branch and bundle cleanup helper"
run = "bash ops/smoketest/smoketest-bmad-recovery-artifact-cleanup.sh"

[tasks."smoketest:bmad-reconcile-submodule-drift"]
description = "Local smoke test for submodule gitlink drift reconcile helper"
run = "bash ops/smoketest/smoketest-bmad-reconcile-submodule-drift.sh"

[tasks."smoketest:hermes-runtime-hygiene"]
description = "Local smoke test for Hermes runtime ignore/track contract"
run = "bash ops/smoketest/smoketest-hermes-runtime-hygiene.sh"

[tasks."smoketest:ops"]
description = "Run consolidated local operator reliability smoke checks (fail-fast)"
run = "mise run smoketest:repo-health-cleanup && mise run smoketest:bmad-closeout-scaffold && mise run smoketest:bmad-closeout-loop && mise run smoketest:bmad-merge-pr-safe && mise run smoketest:bmad-merge-pr-preflight-guard && mise run smoketest:bmad-retrigger-pr-checks && mise run smoketest:bmad-github-body-safety && mise run smoketest:bmad-closeout-cleanup-summary && mise run smoketest:bmad-closeout-artifact-summary && mise run smoketest:bmad-repo-health-retry && mise run smoketest:bmad-repo-health-helper-availability && mise run smoketest:bmad-repo-health-idle-gate && mise run smoketest:bmad-repo-health-pilot-step-autoheal && mise run smoketest:bmad-gh-readonly-status && mise run smoketest:bmad-preflight-strict-clean && mise run smoketest:bmad-reconcile-main-divergence && mise run smoketest:bmad-primary-recovery-check && mise run smoketest:bmad-align-main-with-backup && mise run smoketest:bmad-recovery-artifact-cleanup && mise run smoketest:bmad-reconcile-submodule-drift && mise run smoketest:hermes-runtime-hygiene"

[tasks.logs]
description = "Tail every Bloodbank container"
run = "docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE logs -f"
raw = true

[tasks.ps]
description = "List sandbox containers"
run = """
docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE \
  --profile heartbeat \
  --profile dapr-smoketest --profile dapr-subscribe \
  --profile candystore \
  ps
"""
