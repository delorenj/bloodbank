# Bloodbank — mise.toml
#
# Operator tasks for the self-hosted sandbox. All tasks operate on
# `compose/docker-compose.yml` with the `bloodbank` compose project name.

[env]
_.file = [".env"]
COMPOSE_PROJECT = "bloodbank"
COMPOSE_FILE = "compose/docker-compose.yml"

[tasks.up]
description = "Boot core sandbox (NATS + nats-init only)"
run = "docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE up -d nats nats-init"

[tasks."up:all"]
description = "Boot every compose profile (heartbeat + claude-events + dapr)"
run = """
docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE \
  --profile heartbeat --profile claude-events \
  --profile dapr-smoketest --profile dapr-subscribe \
  up -d
"""

[tasks.down]
description = "Tear the sandbox down (volumes included)"
run = """
docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE \
  --profile heartbeat --profile claude-events \
  --profile dapr-smoketest --profile dapr-subscribe \
  down -v
"""

[tasks.doctor]
description = "Manifest-driven scaffold check (no Docker, no network)"
run = "python3 cli/bb.py doctor"

[tasks."repo-health"]
description = "Read-only git/issue/PR/check snapshot for BMAD evidence"
run = "python3 cli/bb.py repo-health"

[tasks."repo-health:json"]
description = "Read-only structured JSON snapshot for BMAD/scripted evidence"
run = "python3 cli/bb.py repo-health --json"

[tasks."repo-health:artifact"]
description = "Write timestamped JSON BMAD evidence artifact under _bmad_output/evidence"
run = """
bash -lc 'ts=$(date -u +%Y%m%dT%H%M%SZ); out="_bmad_output/evidence/repo-health-${ts}.json"; python3 cli/bb.py repo-health --json --out "$out"; echo "$out"'
"""

[tasks.bootstrap]
description = "Pre-boot file-presence validator"
run = "bash ops/bootstrap/check-platform.sh"

[tasks.smoketest]
description = "NATS-direct event round-trip"
run = "bash ops/smoketest/smoketest.sh"

[tasks."smoketest:command"]
description = "NATS-direct command + reply round-trip"
run = "bash ops/smoketest/smoketest-command.sh"

[tasks."smoketest:dapr"]
description = "Dapr publish smoke test"
run = "bash ops/smoketest/smoketest-dapr.sh"

[tasks."smoketest:dapr-subscribe"]
description = "Dapr publish -> subscribe round-trip"
run = "bash ops/smoketest/smoketest-dapr-subscribe.sh"

[tasks."smoketest:heartbeat"]
description = "Heartbeat producer/consumer end-to-end"
run = "bash ops/smoketest/smoketest-heartbeat.sh"

[tasks."smoketest:claude-events"]
description = "Claude agent.* event round-trip"
run = "bash ops/smoketest/smoketest-claude-events.sh"

[tasks.logs]
description = "Tail every Bloodbank container"
run = "docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE logs -f"
raw = true

[tasks.ps]
description = "List sandbox containers"
run = """
docker compose --project-name $COMPOSE_PROJECT -f $COMPOSE_FILE \
  --profile heartbeat --profile claude-events \
  --profile dapr-smoketest --profile dapr-subscribe \
  ps
"""
