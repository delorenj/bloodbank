# Bloodbank v3 Dapr secret store component
#
# Resolves secret references (e.g. `nats-token` in pubsub.yaml) against
# environment variables with the `BLOODBANK_V3_` prefix. A `secretKeyRef`
# of `{ name: nats-token }` becomes a lookup for `BLOODBANK_V3_NATS_TOKEN`
# in the sidecar's environment.
#
# Using an env-backed secret store keeps the local sandbox free of real
# secret-management dependencies. Swap for a production secret backend
# (e.g. HashiCorp Vault, cloud KMS) via component manifest when leaving
# sandbox scope. No service code change required.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: bloodbank-v3-secretstore
spec:
  type: secretstores.local.env
  version: v1
  metadata:
    - name: prefix
      value: "BLOODBANK_V3_"
