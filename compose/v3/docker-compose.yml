# Bloodbank v3 platform sandbox
#
# Compose project name is locked to `bloodbank-v3` by ADR-0001.
# All services attach to the `bloodbank-v3-network` bridge.
# Environment variables are prefixed `BLOODBANK_V3_` so the Dapr
# `secretstores.local.env` component (see components/secretstore.yaml) can
# project them through a consistent prefix.
#
# This file is scaffold-only. It is not wired to production traffic yet.
# Keep Dapr runtime sidecars out of this file until V3-005 / V3-006 land.

name: bloodbank-v3

networks:
  bloodbank-v3-network:
    name: bloodbank-v3-network
    driver: bridge

volumes:
  bloodbank-v3-nats-data:
  bloodbank-v3-apicurio-data:

services:
  nats:
    # NATS JetStream broker for the v3 event backbone.
    image: nats:2.10-alpine
    container_name: bloodbank-v3-nats
    command:
      - "-js"
      - "-sd"
      - "/data/jetstream"
      - "-m"
      - "8222"
      - "-DV"
    environment:
      BLOODBANK_V3_NATS_URL: "nats://nats:4222"
    ports:
      - "${BLOODBANK_V3_NATS_CLIENT_PORT:-4222}:4222"
      - "${BLOODBANK_V3_NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - bloodbank-v3-nats-data:/data/jetstream
    healthcheck:
      # JetStream monitoring endpoint. `nats:2.10-alpine` ships busybox wget.
      # `--spider` avoids downloading the body; we just want the HTTP 200.
      test: ["CMD-SHELL", "wget --spider --quiet --timeout=3 http://127.0.0.1:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - bloodbank-v3-network
    restart: unless-stopped

  nats-init:
    # One-shot: apply `nats/streams.json` to the running NATS server so
    # `BLOODBANK_V3_EVENTS` and `BLOODBANK_V3_COMMANDS` exist before any
    # producer publishes. Without this, the first `event.*` publish returns
    # "no stream matched subject" and silently drops the message.
    #
    # Idempotent: `nats stream add` that would collide with an existing stream
    # logs and exits non-zero; the init script swallows that case and exits 0.
    image: natsio/nats-box:0.14.5
    container_name: bloodbank-v3-nats-init
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: "nats://nats:4222"
    volumes:
      - ./nats/streams.json:/work/streams.json:ro
      - ./nats/init.sh:/work/init.sh:ro
    entrypoint: ["/bin/sh", "/work/init.sh"]
    networks:
      - bloodbank-v3-network
    restart: "no"

  dapr-placement:
    # Dapr placement service; required once service sidecars land. It does
    # not speak to NATS directly — sidecars resolve actors through it.
    image: daprio/dapr:1.13.0
    container_name: bloodbank-v3-dapr-placement
    command:
      - "./placement"
      - "--port"
      - "50005"
    environment:
      BLOODBANK_V3_DAPR_PLACEMENT_PORT: "50005"
    ports:
      - "${BLOODBANK_V3_DAPR_PLACEMENT_PORT:-50005}:50005"
    networks:
      - bloodbank-v3-network
    restart: unless-stopped

  echo-sub:
    # Minimal Dapr subscriber app for the v3 subscribe smoke test. Python
    # stdlib only (http.server); no third-party deps, no build step.
    # Bind-mounts ops/v3/smoketest/echo-sub/app.py read-only.
    #
    # Profile: `dapr-subscribe`. Started only when that profile is active.
    image: python:3.11-alpine
    container_name: bloodbank-v3-echo-sub
    profiles:
      - dapr-subscribe
    command: ["python", "-u", "/work/app.py"]
    environment:
      APP_PORT: "3001"
      SUBSCRIBE_PUBSUB: "bloodbank-v3-pubsub"
      SUBSCRIBE_TOPIC: "event.dapr.subscribe.ping"
      SUBSCRIBE_ROUTE: "/events/smoketest"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ../../ops/v3/smoketest/echo-sub/app.py:/work/app.py:ro
    ports:
      # Test hook port for the smoke test's /inspect/* queries. Not used
      # by daprd (daprd reaches the app via the compose network on the
      # container-internal port, not the host-mapped port).
      - "${BLOODBANK_V3_ECHO_SUB_PORT:-3301}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet --timeout=3 http://127.0.0.1:3001/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - bloodbank-v3-network
    restart: unless-stopped

  daprd-subscribe:
    # Dapr sidecar wired to `echo-sub` via --app-port + --app-channel-address.
    # On startup, Dapr hits GET http://echo-sub:3001/dapr/subscribe to learn
    # which topics to deliver. Thereafter, POSTs matching events back to
    # http://echo-sub:3001<route>.
    #
    # Profile: `dapr-subscribe`.
    image: daprio/daprd:1.13.0
    container_name: bloodbank-v3-daprd-subscribe
    profiles:
      - dapr-subscribe
    command:
      - "./daprd"
      - "--app-id=bloodbank-v3-echo-sub"
      - "--dapr-http-port=3501"
      - "--dapr-grpc-port=50002"
      - "--app-port=3001"
      - "--app-channel-address=echo-sub"
      - "--app-protocol=http"
      - "--resources-path=/components"
      - "--placement-host-address=dapr-placement:50005"
      - "--log-level=info"
    depends_on:
      nats-init:
        condition: service_completed_successfully
      dapr-placement:
        condition: service_started
      echo-sub:
        condition: service_healthy
    volumes:
      - ./components:/components:ro
    ports:
      # Only HTTP is exposed to the host; gRPC stays internal to the
      # compose network (no external caller needs it for the subscribe
      # smoke test).
      - "${BLOODBANK_V3_DAPR_SUBSCRIBE_HTTP_PORT:-3501}:3501"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet --timeout=3 http://127.0.0.1:3501/v1.0/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bloodbank-v3-network
    restart: unless-stopped

  daprd-smoketest:
    # Dapr sidecar in "no-app" mode for smoke-testing the publish path.
    # Runs without an attached app (subscribers would need an app callback
    # port, which we'll wire when real services land). Exposes the HTTP
    # publish API so the dapr smoke test can POST CloudEvents envelopes.
    #
    # Profile: `dapr-smoketest`. Started only when that profile is active.
    # This keeps default `docker compose up` scoped to the NATS-only sandbox
    # (wave 4 smoke test) and makes the Dapr surface opt-in.
    image: daprio/daprd:1.13.0
    container_name: bloodbank-v3-daprd-smoketest
    profiles:
      - dapr-smoketest
    command:
      - "./daprd"
      - "--app-id=bloodbank-v3-smoketest"
      - "--dapr-http-port=3500"
      - "--dapr-grpc-port=50001"
      - "--resources-path=/components"
      - "--placement-host-address=dapr-placement:50005"
      - "--log-level=info"
    depends_on:
      nats-init:
        condition: service_completed_successfully
      dapr-placement:
        condition: service_started
    volumes:
      - ./components:/components:ro
    ports:
      - "${BLOODBANK_V3_DAPR_HTTP_PORT:-3500}:3500"
      - "${BLOODBANK_V3_DAPR_GRPC_PORT:-50001}:50001"
    healthcheck:
      # Dapr exposes its own healthz on the HTTP port once components load.
      test: ["CMD-SHELL", "wget --spider --quiet --timeout=3 http://127.0.0.1:3500/v1.0/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bloodbank-v3-network
    restart: unless-stopped

  # NOTE: Dapr sidecars are not defined here. When V3-005+ add app services,
  # each sidecar will mount the components directory read-only:
  #
  #   volumes:
  #     - ./components:/components:ro
  #
  # and pass `--components-path /components` so that the manifests in
  # compose/v3/components/*.yaml are loaded. The `pubsub.yaml` file there
  # references `nats://nats:4222` via the service name on this network.

  apicurio-registry:
    # Apicurio is the runtime-side schema registry. Holyfields is the write
    # side; producers/consumers pull schemas from Apicurio at runtime.
    image: apicurio/apicurio-registry:3.0.6
    container_name: bloodbank-v3-apicurio-registry
    environment:
      BLOODBANK_V3_APICURIO_PORT: "8080"
      QUARKUS_HTTP_HOST: "0.0.0.0"
      QUARKUS_HTTP_PORT: "8080"
      APICURIO_STORAGE_KIND: "sql"
      APICURIO_STORAGE_SQL_KIND: "h2"
    ports:
      - "${BLOODBANK_V3_APICURIO_PORT:-8080}:8080"
    volumes:
      - bloodbank-v3-apicurio-data:/var/apicurio/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/q/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bloodbank-v3-network
    restart: unless-stopped

  eventcatalog:
    # EventCatalog consumes generated artifacts (AsyncAPI, schemas, SDKs)
    # produced by Holyfields. The mount point convention for this sandbox
    # is ./eventcatalog/site on the host, which later tickets will populate
    # via Holyfields generation output. Empty until then.
    image: quay.io/eventcatalog/eventcatalog:2.11.1
    container_name: bloodbank-v3-eventcatalog
    environment:
      BLOODBANK_V3_EVENTCATALOG_PORT: "3000"
      PORT: "3000"
      NODE_ENV: "production"
    ports:
      - "${BLOODBANK_V3_EVENTCATALOG_PORT:-3000}:3000"
    volumes:
      - ./eventcatalog/site:/app/site:ro
    networks:
      - bloodbank-v3-network
    depends_on:
      apicurio-registry:
        # Wait for Apicurio's healthcheck to report ready before starting
        # EventCatalog. `service_started` races with Apicurio's boot time
        # and produces flaky startup when EventCatalog eagerly queries the
        # registry at launch.
        condition: service_healthy
    restart: unless-stopped
